name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Format check
        run: shfmt -d -i 2 butler bin/ scripts/

      - name: Lint
        run: just lint

      - name: Test
        run: just test
