services:
  web:
    image: nginx:latest
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - ./app:/app
    expose:
      - 80
    environment:
      VIRTUAL_HOST: "${BUTLER_PROJECT}.${BUTLER_TLD:-test}"
    networks:
      - default
  php:
    build:
      context: .
      dockerfile: PHP.DockerFile
    container_name: "${BUTLER_PROJECT}.${BUTLER_TLD:-test}"
    volumes:
      - ./app:/app
    networks:
      - mysql
      - default
    secrets:
      - user_ssh
networks:
  mysql:
    external: true
    name: mysql
  default:
    external: true
    name: nginx-proxy
secrets:
  user_ssh:
    file: ~/.ssh
