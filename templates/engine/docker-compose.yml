services:
  php:
    build:
      context: .
      dockerfile: PHP.DockerFile
    container_name: "${BUTLER_PROJECT}.${BUTLER_TLD:-test}"
    volumes:
      - ./app:/var/www/html
      - ./docker-php-ext-xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    expose:
      - 80
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      VIRTUAL_HOST: "${BUTLER_PROJECT}.${BUTLER_TLD:-test}"
      APACHE_DOCUMENT_ROOT: /var/www/html/public
    networks:
      - default
    secrets:
      - user_ssh
networks:
  default:
    external: true
    name: butler
secrets:
  user_ssh:
    file: ~/.ssh
