services:
  php:
    build:
      context: .
      dockerfile: PHP.DockerFile
    container_name: "${BUTLER_PROJECT}.${BUTLER_TLD:-test}"
    volumes:
      - ./app:/var/www/html
      - ./docker-php-ext-xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
      - ./000-default.conf:/etc/apache2/sites-available/000-default.conf
    expose:
      - 80
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      VIRTUAL_HOST: "${BUTLER_PROJECT}.${BUTLER_TLD:-test}"
      APACHE_DOCUMENT_ROOT: /var/www/html/public
      APACHE_COMMERCE_DOCUMENT_ROOT: /var/www/html/shared/lib/commerce/public
    networks:
      - default
      - mysql
      - mailhog
    secrets:
      - user_ssh
networks:
  mailhog:
    external: true
    name: mailhog
  mysql:
    external: true
    name: mysql
  default:
    external: true
    name: nginx-proxy
secrets:
  user_ssh:
    file: ~/.ssh
