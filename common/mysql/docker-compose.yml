services:
  mysql:
    container_name: mysql
    image: mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: 'secret'
      TZ: 'Europe/London'
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - 3306:3306
    networks:
      - default
    command: --sql_mode="NO_ENGINE_SUBSTITUTION"
volumes:
  mysqldata: {}
networks:
  default:
    external: true
    name: butler
